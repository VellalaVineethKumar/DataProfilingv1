services:
  profiler:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - profiler_data:/app/data
      - ./auth/users.json:/app/auth/users.json
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  profiler_data:
